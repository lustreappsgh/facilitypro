version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: af_php
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: afm5
      DB_USERNAME: afm5
      DB_PASSWORD: afm5
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: af_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: af_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: afm5
      MYSQL_USER: afm5
      MYSQL_PASSWORD: afm5
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro

  redis:
    image: redis:7-alpine
    container_name: af_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  node:
    image: node:20-alpine
    container_name: af_node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    depends_on:
      - php

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: af_queue
    working_dir: /var/www/html
    command: php artisan queue:work --tries=1 --sleep=1 --timeout=90
    volumes:
      - ./:/var/www/html
    depends_on:
      - php
      - mysql
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: af_scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      - php
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
  node_modules:
